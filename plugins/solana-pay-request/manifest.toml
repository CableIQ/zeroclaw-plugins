name = "solana-pay-request"
version = "0.1.0"
description = "Generate Solana Pay request URLs for transfer transactions"
author = "ZeroClaw Labs"
wasm_path = "solana_pay_request.wasm"
capabilities = ["tool"]
# config_read: the host injects this plugin's own config section (mint, etc.)
# into execute args as `__config`. Without it the plugin still works with
# defaults (USDC mint).
permissions = ["config_read"]
